<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Brands</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="brands">
      <div class="container">
        <h2 class="brands-title">РЕМОНТ ТЕХНИКИ РАЗЛИЧНЫХ БРЕНДОВ</h2>

        <div class="brands-slider swiper">
          <div class="brands-list swiper-wrapper">
            <div class="brand-card swiper-slide">
              <img src="./assets/lenovo.png" alt="Lenovo" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/samsung.png" alt="Samsung" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/apple.png" alt="Apple" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/ViewSonic.png" alt="ViewSonic" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/bosch.png" alt="Bosch" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/hp.png" alt="HP" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/acer.png" alt="Acer" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/sony.png" alt="Sony" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/lenovo.png" alt="Lenovo" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/samsung.png" alt="Samsung" />
              <button class="brand-btn">›</button>
            </div>

            <div class="brand-card swiper-slide">
              <img src="./assets/Apple.png" alt="Apple" />
              <button class="brand-btn">›</button>
            </div>
          </div>

          <div class="swiper-pagination"></div>
        </div>

        <button class="show-more">
          <img class="show-more-icon" src="./assets/expand-1.svg" alt="arrow" />

          <span class="show-more-text"> Показать все </span>
        </button>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
